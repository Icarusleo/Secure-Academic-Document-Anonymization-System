<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Upload Article</title>
    <style>
        /* Genel sayfa stilleri */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Kart görünümü */
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
        }

        h2 {
            text-align: center;
            color: #333;
        }

        /* Mesaj kutusu */
        .message {
            background-color: #e0ffe0;
            color: #006600;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #00aa00;
            border-radius: 5px;
            text-align: center;
        }

        /* Form elemanları */
        form {
            display: flex;
            flex-direction: column;
        }

        input[type="email"],
        input[type="file"],
        textarea {
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
        }

        button {
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }

        /* Responsive (Mobil uyumlu) */
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Upload Article</h2>

        {% if article_no %}
            <div class="message">
                Your article successfully uploaded! <br>
                <strong>Article Pursuit Code: {{ article_no }}</strong>
            </div>
        {% endif %}

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Upload</button>
        </form>
    </div>

</body>
</html>
